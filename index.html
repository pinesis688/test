<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=2.0">
<title>Wordle</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="home" class="screen">
<div class="topbar">
<button class="top-btn" id="avatarBtn" title="设置" aria-label="设置">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>
<div class="brand">Wordle</div>
<button class="a11y-btn" id="a11yBtn" title="高对比/色盲模式" aria-label="高对比与色盲图案模式" aria-pressed="false">A+</button>
<div class="diff-tabs" id="diffTabs"></div>
</div>
<div class="home-body">
<button class="signin-card" id="signinBtn">
<div class="signin-row">
<div class="signin-cal"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
<div class="signin-meta">
<div class="signin-text" id="signinDate">--/--</div>
<div class="signin-sub" id="signinSub">点击签到</div>
</div>
<div class="signin-streak" id="signinStreak">0</div>
</div>
</button>
<div class="quick-row">
<button class="quick-btn" id="tabBook">词库</button>
<button class="quick-btn" id="tabReview">复习</button>
<button class="quick-btn" id="tabStats">统计</button>
</div>
<div class="home-spacer"></div>
<button class="start-btn" id="startBtn">
<span class="start-label">开始游戏</span>
<span class="start-count" id="gameCount">0 局</span>
</button>
</div>
</div>

<div class="settings-panel" id="settingsPanel">
<button class="sp-close" id="spClose">✕</button>
<div class="sp-title">设置</div>
<div class="sp-sub">选择难度开始游戏</div>
<div class="sp-list">
<div class="sp-item"><div class="sp-label">词汇难度 <b id="spDiffHint">高考 · 0词</b></div><div class="sp-opts c5" id="spDiffOpts"></div></div>
<div class="sp-item"><div class="sp-label">单词长度 <b>字母数</b></div><div class="sp-opts c4" id="spLenOpts"></div></div>
<div class="sp-item"><div class="sp-label">尝试次数 <b>行数</b></div><div class="sp-opts c3" id="spAttemptOpts"></div></div>
<button class="sp-adv-toggle" id="spAdvToggle" aria-expanded="false">高级选项 <span class="sp-adv-caret">▾</span></button>
<div class="sp-advanced" id="spAdvanced" hidden>
<div class="sp-item"><div class="sp-label">提示数量 <b>锁定字母</b></div><div class="sp-opts c4" id="spHintOpts"></div></div>
<div class="sp-item"><div class="sp-label">排除数量 <b>排除字母</b></div><div class="sp-opts c7" id="spExcludeOpts"></div></div>
<div class="sp-item"><div class="sp-label">限时模式 <b>秒/局</b></div><div class="sp-opts c4" id="spTimedOpts"></div></div>
</div>
</div>
<button class="sp-go" id="spGo">开始游戏</button>
</div>

<div id="game">
<header>
<div class="hl"><button class="ib" id="homeBtn" title="返回">←</button><button class="ib" id="helpBtn" title="帮助">?</button></div>
<h1>Wordle</h1>
<div class="hr"><button class="ib" id="dictBtn" title="查词" aria-label="查词"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></button><button class="ib" id="statsBtn" title="统计" aria-label="统计"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></button></div>
</header>
<div class="gbar">
<div class="gi" id="gameInfo"></div>
<div class="gbtns">
<button class="gb" id="hintBtn">提示</button>
<button class="gb exclude" id="excludeBtn">排除</button>
<button class="gb" id="surrenderBtn">放弃</button>
</div>
</div>
<div id="board" role="grid" aria-label="猜词棋盘"></div>
<div id="kb" role="group" aria-label="字母键盘"></div>
</div>
<div id="toast" role="status" aria-live="polite"></div>
<div id="modal" role="dialog" aria-modal="true" aria-label="弹窗"><div class="mc" id="modalContent"></div></div>

<script src="data/vocab.js"></script>
<script src="data/mean.js"></script>
<script src="data/idiom.js"></script>
<script src="js/config.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
