<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wordle</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --text: #1a1a1b;
      --border: #d3d6da;
      --tile-border: #878a8c;
      --tile-filled: #878a8c;
      --key-bg: #d3d6da;
      --key-text: #1a1a1b;
      --correct: #6aaa64;
      --present: #c9b458;
      --absent: #787c7e;
      --absent-key: #868a8e;
      --modal-bg: #ffffff;
      --shadow: rgba(0, 0, 0, 0.15);
    }

    body.dark {
      --bg: #121213;
      --text: #ffffff;
      --border: #3a3a3c;
      --tile-border: #3a3a3c;
      --tile-filled: #565758;
      --key-bg: #818384;
      --key-text: #ffffff;
      --correct: #538d4e;
      --present: #b59f3b;
      --absent: #3a3a3c;
      --absent-key: #3a3a3c;
      --modal-bg: #2a2a2b;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s;
    }

    /* ==================== 顶部栏 ==================== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 90px;
    }

    .header-right {
      justify-content: flex-end;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .icon-btn:hover {
      background: var(--border);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ==================== 消息提示 ==================== */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 18px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      box-shadow: 0 2px 10px var(--shadow);
      text-transform: uppercase;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ==================== 游戏主区 ==================== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
    }

    /* ==================== 网格 ==================== */
    #board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      padding: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .tile {
      width: 62px;
      height: 62px;
      border: 2px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      user-select: none;
      transition: transform 0.1s, border-color 0.15s;
    }

    .tile.filled {
      border-color: var(--tile-filled);
      animation: pop 0.12s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* 翻转动画 */
    .tile.flip {
      animation: flip 0.6s ease forwards;
    }

    @keyframes flip {
      0% { transform: rotateX(0); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }

    .tile.correct {
      background: var(--correct);
      border-color: var(--correct);
      color: #fff;
    }

    .tile.present {
      background: var(--present);
      border-color: var(--present);
      color: #fff;
    }

    .tile.absent {
      background: var(--absent);
      border-color: var(--absent);
      color: #fff;
    }

    /* 抖动动画（无效单词） */
    .row.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* 胜利弹跳 */
    .tile.win {
      animation: bounce 0.5s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-20px); }
      60% { transform: translateY(0); }
    }

    /* ==================== 键盘 ==================== */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 6px 12px;
      width: 100%;
      max-width: 500px;
      user-select: none;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      flex: 1;
      max-width: 44px;
      height: 58px;
      background: var(--key-bg);
      color: var(--key-text);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.08s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: inherit;
    }

    .key:active {
      transform: scale(0.92);
    }

    .key.wide {
      flex: 1.5;
      max-width: 70px;
      font-size: 12px;
    }

    .key.correct {
      background: var(--correct);
      color: #fff;
    }

    .key.present {
      background: var(--present);
      color: #fff;
    }

    .key.absent {
      background: var(--absent-key);
      color: #fff;
    }

    /* ==================== 模态框 ==================== */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }

    #modal.show {
      display: flex;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--modal-bg);
      color: var(--text);
      border-radius: 8px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px var(--shadow);
      animation: slidein 0.25s ease;
    }

    @keyframes slidein {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 14px;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    .modal-word {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 12px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 6px;
      margin-bottom: 20px;
      color: var(--text);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .dist-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-align: left;
    }

    .dist-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .dist-num {
      width: 14px;
      text-align: center;
      font-weight: 700;
    }

    .dist-bar {
      flex: 1;
      background: var(--absent);
      color: #fff;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      text-align: right;
      min-width: 24px;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .dist-bar.highlight {
      background: var(--correct);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, opacity 0.15s;
    }

    .modal-btn:active {
      transform: scale(0.96);
    }

    .modal-btn.primary {
      background: var(--correct);
      color: #fff;
    }

    .modal-btn.secondary {
      background: var(--key-bg);
      color: var(--key-text);
    }

    /* 帮助模态 */
    .help-list {
      text-align: left;
      margin-bottom: 20px;
    }

    .help-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 1.4;
    }

    .help-tiles {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .help-tile {
      width: 26px;
      height: 26px;
      border: 2px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .help-tile.correct { background: var(--correct); border-color: var(--correct); color: #fff; }
    .help-tile.present { background: var(--present); border-color: var(--present); color: #fff; }
    .help-tile.absent { background: var(--absent); border-color: var(--absent); color: #fff; }

    .help-text {
      flex: 1;
    }

    .help-text b {
      font-weight: 700;
    }

    .help-close {
      width: 100%;
      padding: 14px;
      background: var(--correct);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ==================== 响应式 ==================== */
    @media (max-width: 420px) {
      .tile {
        width: 52px;
        height: 52px;
        font-size: 28px;
      }
      .key {
        height: 52px;
        font-size: 14px;
      }
      .key.wide {
        font-size: 11px;
      }
      h1 { font-size: 24px; }
    }

    @media (max-width: 360px) {
      .tile {
        width: 46px;
        height: 46px;
        font-size: 24px;
      }
      .key {
        height: 48px;
        max-width: 38px;
        font-size: 13px;
      }
    }
  </style>
</head>

    <div id="keyboard"></div>

      "WHIRR","WHIRS","WHISK","WHIST","WHITE","WHITS","WHIZZ","WHOLE","WHOMP","WHOMS",
      "WHORE","WHORL","WHOSE","WICKS","WIDED","WIDER","WIDES","WIDOW","WIDTH","WIELD",
      "WIGHT","WIKIS","WILDS","WILES","WILLS","WILLY","WILTS","WIMPS","WIMPY","WINCE",
      "WINCH","WINDS","WINDY","WINED","WINES","WINGS","WINKS","WINOS","WIPED","WIPER",
      "WIPES","WIRED","WIREY","WIRES","WISER","WISES","WISHY","WISPS","WISPY","WITCH",
      "WITHE","WITTY","WIVES","WOKEN","WOLFS","WOMAN","WOMBS","WOMEN","WOODY","WOOED",
      "WOOER","WOOFS","WOOED","WORST","WORTH","WOULDS","WOUND","WOVEN","WRACK","WRAPS",
      "WRATH","WREAK","WRECK","WRENS","WREST","WRIST","WRITE","WRITS","WROTE","WROTH",
      "WRUNG","WRYLY","WUSSY","XENON","YACHT","YANKS","YARDS","YARNS","YAWLS","YAWNS",
      "YEARS","YEAST","YELLS","YELPS","YESES","YIELD","YIPES","YODEL","YOGAS","YOGIC",
      "YOGIS","YOKED","YOKEL","YOKES","YOLKS","YOLKY","YORE","YOUNG","YOUR","YOURS",
      "YOUTH","YOWLS","YOYOS","YUCCA","YUCKS","YUHAN","YUMMY","YUPPY","ZAIRE","ZAPPY",
      "ZEALS","ZEBRA","ZEROS","ZESTY","ZILCH","ZILLS","ZINCS","ZINGS","ZINGY","ZIPPY",
      "ZONAL","ZONED","ZONES","ZOOMS","ZOOTY"
    ];

    // 合并并去重形成有效词集合
    const VALID_SET = new Set([...ANSWERS, ...EXTRA_VALID]);

    // ==================== 游戏状态 ====================
    const MAX_ROWS = 6;
    const WORD_LEN = 5;

    const State = {
      answer: '',
      guesses: [],         // 已提交的猜测
      current: '',         // 当前输入
      row: 0,
      status: 'playing',   // playing | won | lost
      keyStates: {},       // 键盘字母状态
      animating: false,
      stats: {
        played: 0,
        wins: 0,
        currentStreak: 0,
        maxStreak: 0,
        distribution: [0, 0, 0, 0, 0, 0]
      }
    };

    // ==================== DOM 引用 ====================
    const boardEl = document.getElementById('board');
    const keyboardEl = document.getElementById('keyboard');
    const toastEl = document.getElementById('toast');
    const modalEl = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');

    // ==================== 存储 ====================
    const Storage = {
      KEY: 'wordle_clone_v1',
      load() {
        try {
          const s = JSON.parse(localStorage.getItem(this.KEY));
          if (s) {
            State.stats = { ...State.stats, ...s.stats };
            if (s.dark) document.body.classList.add('dark');
          }
        } catch (e) {}
      },
      save() {
        try {
          localStorage.setItem(this.KEY, JSON.stringify({
            stats: State.stats,
            dark: document.body.classList.contains('dark')
          }));
        } catch (e) {}
      }
    };

    // ==================== 初始化 ====================
    function init() {
      Storage.load();
      buildBoard();
      buildKeyboard();
      bindEvents();
      newGame();
      updateThemeBtn();
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < MAX_ROWS; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.dataset.row = r;
        for (let c = 0; c < WORD_LEN; c++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.dataset.row = r;
          tile.dataset.col = c;
          row.appendChild(tile);
        }
        boardEl.appendChild(row);
      }
    }

    function buildKeyboard() {
      const layout = [
        ['q','w','e','r','t','y','u','i','o','p'],
        ['a','s','d','f','g','h','j','k','l'],
        ['enter','z','x','c','v','b','n','m','back']
      ];
      keyboardEl.innerHTML = '';
      layout.forEach(rowKeys => {
        const row = document.createElement('div');
        row.className = 'keyboard-row';
        rowKeys.forEach(k => {
          const btn = document.createElement('button');
          btn.className = 'key' + ((k === 'enter' || k === 'back') ? ' wide' : '');
          btn.dataset.key = k;
          btn.textContent = k === 'back' ? '⌫' : k.toUpperCase();
          btn.addEventListener('click', () => handleKey(k));
          row.appendChild(btn);
        });
        keyboardEl.appendChild(row);
      });
    }

    function bindEvents() {
      document.addEventListener('keydown', (e) => {
        if (modalEl.classList.contains('show') && e.key === 'Enter') {
          closeModal();
          return;
        }
        if (modalEl.classList.contains('show')) return;
        if (State.animating) return;
        const key = e.key.toLowerCase();
        if (key === 'enter') handleKey('enter');
        else if (key === 'backspace') handleKey('back');
        else if (/^[a-z]$/.test(key)) handleKey(key);
      });

      document.getElementById('themeBtn').addEventListener('click', toggleTheme);
      document.getElementById('statsBtn').addEventListener('click', () => showStats());
      document.getElementById('helpBtn').addEventListener('click', () => showHelp());

      modalEl.addEventListener('click', (e) => {
        if (e.target === modalEl) closeModal();
      });
    }

    // ==================== 新游戏 ====================
    function newGame() {
      State.answer = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
      State.guesses = [];
      State.current = '';
      State.row = 0;
      State.status = 'playing';
      State.keyStates = {};
      State.animating = false;
      buildBoard();
      // 重置键盘颜色
      document.querySelectorAll('.key').forEach(k => {
        k.classList.remove('correct', 'present', 'absent');
      });
      closeModal();
    }

    // ==================== 输入处理 ====================
    function handleKey(k) {
      if (State.status !== 'playing' || State.animating) return;
      if (k === 'enter') {
        submitGuess();
      } else if (k === 'back') {
        if (State.current.length > 0) {
          State.current = State.current.slice(0, -1);
          updateRow();
        }
      } else if (/^[a-z]$/.test(k)) {
        if (State.current.length < WORD_LEN) {
          State.current += k;
          updateRow();
        }
      }
    }

    function updateRow() {
      const row = boardEl.children[State.row];
      if (!row) return;
      const tiles = row.children;
      for (let i = 0; i < WORD_LEN; i++) {
        const ch = State.current[i] || '';
        tiles[i].textContent = ch.toUpperCase();
        tiles[i].classList.toggle('filled', !!ch);
      }
    }

    // ==================== 提交猜测 ====================
    function submitGuess() {
      if (State.current.length !== WORD_LEN) {
        showToast('Not enough letters');
        shakeRow();
        return;
      }
      const guess = State.current.toLowerCase();
      const upper = State.current.toUpperCase();
      if (!VALID_SET.has(upper)) {
        showToast('Not in word list');
        shakeRow();
        return;
      }

      const result = evaluateGuess(upper, State.answer);
      State.animating = true;
      const row = boardEl.children[State.row];
      const tiles = row.children;

      // 逐个翻转
      for (let i = 0; i < WORD_LEN; i++) {
        setTimeout(() => {
          tiles[i].classList.add('flip');
          setTimeout(() => {
            tiles[i].classList.remove('filled');
            tiles[i].classList.add(result[i]);
          }, 300);
        }, i * 250);
      }

      // 翻转完成后更新键盘与状态
      setTimeout(() => {
        // 更新键盘颜色（优先级 correct > present > absent）
        for (let i = 0; i < WORD_LEN; i++) {
          const ch = upper[i];
          const st = result[i];
          const cur = State.keyStates[ch];
          if (st === 'correct') State.keyStates[ch] = 'correct';
          else if (st === 'present' && cur !== 'correct') State.keyStates[ch] = 'present';
          else if (st === 'absent' && !cur) State.keyStates[ch] = 'absent';
        }
        applyKeyStates();

        State.guesses.push({ word: upper, result });
        State.row++;
        State.current = '';

        const won = upper === State.answer;
        if (won) {
          State.status = 'won';
          // 弹跳动画
          for (let i = 0; i < WORD_LEN; i++) {
            setTimeout(() => tiles[i].classList.add('win'), i * 100);
          }
          State.stats.played++;
          State.stats.wins++;
          State.stats.currentStreak++;
          State.stats.maxStreak = Math.max(State.stats.maxStreak, State.stats.currentStreak);
          State.stats.distribution[State.row - 1]++;
          Storage.save();
          setTimeout(() => showResult(true), 1500);
        } else if (State.row >= MAX_ROWS) {
          State.status = 'lost';
          State.stats.played++;
          State.stats.currentStreak = 0;
          Storage.save();
          setTimeout(() => showResult(false), 600);
        }
        State.animating = false;
      }, WORD_LEN * 250 + 350);
    }

    // 评估猜测
    function evaluateGuess(guess, answer) {
      const result = new Array(WORD_LEN).fill('absent');
      const answerArr = answer.split('');
      const guessArr = guess.split('');
      // 先标 correct
      for (let i = 0; i < WORD_LEN; i++) {
        if (guessArr[i] === answerArr[i]) {
          result[i] = 'correct';
          answerArr[i] = null;
        }
      }
      // 再标 present
      for (let i = 0; i < WORD_LEN; i++) {
        if (result[i] === 'correct') continue;
        const idx = answerArr.indexOf(guessArr[i]);
        if (idx !== -1) {
          result[i] = 'present';
          answerArr[idx] = null;
        }
      }
      return result;
    }

    function applyKeyStates() {
      document.querySelectorAll('.key').forEach(k => {
        const ch = k.dataset.key;
        k.classList.remove('correct', 'present', 'absent');
        if (State.keyStates[ch]) {
          k.classList.add(State.keyStates[ch]);
        }
      });
    }

    function shakeRow() {
      const row = boardEl.children[State.row];
      if (!row) return;
      row.classList.add('shake');
      setTimeout(() => row.classList.remove('shake'), 400);
    }

    // ==================== Toast ====================
    let toastTimer = null;
    function showToast(text, duration = 1500) {
      toastEl.textContent = text;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ==================== 模态框 ====================
    function closeModal() {
      modalEl.classList.remove('show');
    }

    function showResult(won) {
      const winPct = State.stats.played ? Math.round(State.stats.wins / State.stats.played * 100) : 0;
      const title = won ? '🎉 漂亮！' : '😵 失败了';
      const sub = won
        ? `你用 ${State.row} 次猜中了答案`
        : `别灰心，再来一局！`;
      const maxDist = Math.max(1, ...State.stats.distribution);
      const distHtml = State.stats.distribution.map((n, i) => {
        const w = Math.round(n / maxDist * 100);
        const hi = (won && i === State.row - 1) ? ' highlight' : '';
        return `<div class="dist-row">
          <div class="dist-num">${i + 1}</div>
          <div class="dist-bar${hi}" style="width: ${Math.max(20, w)}%">${n}</div>
        </div>`;
      }).join('');

      modalContent.innerHTML = `
        <div class="modal-title">${title}</div>
        <div class="modal-subtitle">${sub}</div>
        <div class="modal-word">${State.answer}</div>
        <div class="dist-title">猜中次数分布</div>
        ${distHtml}
        <div class="stats" style="margin-top:16px">
          <div class="stat-item"><div class="stat-num">${State.stats.played}</div><div class="stat-label">已玩</div></div>
          <div class="stat-item"><div class="stat-num">${winPct}</div><div class="stat-label">胜率%</div></div>
          <div class="stat-item"><div class="stat-num">${State.stats.currentStreak}</div><div class="stat-label">当前连胜</div></div>
          <div class="stat-item"><div class="stat-num">${State.stats.maxStreak}</div><div class="stat-label">最长连胜</div></div>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn secondary" id="closeModalBtn">关闭</button>
          <button class="modal-btn primary" id="newGameBtn">新游戏</button>
        </div>
      `;
      modalEl.classList.add('show');
      document.getElementById('newGameBtn').addEventListener('click', newGame);
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    }

    function showStats() {
      const winPct = State.stats.played ? Math.round(State.stats.wins / State.stats.played * 100) : 0;
      const maxDist = Math.max(1, ...State.stats.distribution);
      const distHtml = State.stats.distribution.map((n, i) => {
        const w = Math.round(n / maxDist * 100);
        return `<div class="dist-row">
          <div class="dist-num">${i + 1}</div>
          <div class="dist-bar" style="width: ${Math.max(20, w)}%">${n}</div>
        </div>`;
      }).join('');

      modalContent.innerHTML = `
        <div class="modal-title">📊 统计</div>
        <div class="stats" style="margin:20px 0">
          <div class="stat-item"><div class="stat-num">${State.stats.played}</div><div class="stat-label">已玩</div></div>
          <div class="stat-item"><div class="stat-num">${winPct}</div><div class="stat-label">胜率%</div></div>
          <div class="stat-item"><div class="stat-num">${State.stats.currentStreak}</div><div class="stat-label">当前连胜</div></div>
          <div class="stat-item"><div class="stat-num">${State.stats.maxStreak}</div><div class="stat-label">最长连胜</div></div>
        </div>
        <div class="dist-title">猜中次数分布</div>
        ${distHtml}
        <div class="modal-buttons">
          <button class="modal-btn primary" id="closeStatsBtn">关闭</button>
        </div>
      `;
      modalEl.classList.add('show');
      document.getElementById('closeStatsBtn').addEventListener('click', closeModal);
    }

    function showHelp() {
      modalContent.innerHTML = `
        <div class="modal-title">如何游戏</div>
        <div class="modal-subtitle" style="margin-bottom:16px">猜出隐藏的 5 字母单词，共 6 次机会</div>
        <div class="help-list">
          <div class="help-item">
            <div class="help-tiles">
              <div class="help-tile correct">W</div>
              <div class="help-tile">O</div>
              <div class="help-tile">R</div>
              <div class="help-tile">D</div>
              <div class="help-tile">S</div>
            </div>
            <div class="help-text"><b>W</b> 在答案中且位置正确</div>
          </div>
          <div class="help-item">
            <div class="help-tiles">
              <div class="help-tile">P</div>
              <div class="help-tile present">I</div>
              <div class="help-tile">L</div>
              <div class="help-tile">L</div>
              <div class="help-tile">S</div>
            </div>
            <div class="help-text"><b>I</b> 在答案中但位置不对</div>
          </div>
          <div class="help-item">
            <div class="help-tiles">
              <div class="help-tile">V</div>
              <div class="help-tile">A</div>
              <div class="help-tile">G</div>
              <div class="help-tile absent">U</div>
              <div class="help-tile">E</div>
            </div>
            <div class="help-text"><b>U</b> 不在答案中</div>
          </div>
        </div>
        <div style="font-size:12px;text-align:left;margin-bottom:16px;opacity:0.8;line-height:1.5">
          每次猜测必须是有效的 5 字母单词。按回车提交。<br>
          颜色提示将帮助你一步步逼近答案。
        </div>
        <button class="help-close" id="closeHelpBtn">明白了</button>
      `;
      modalEl.classList.add('show');
      document.getElementById('closeHelpBtn').addEventListener('click', closeModal);
    }

    // ==================== 主题切换 ====================
    function toggleTheme() {
      document.body.classList.toggle('dark');
      Storage.save();
      updateThemeBtn();
    }

    function updateThemeBtn() {
      const btn = document.getElementById('themeBtn');
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }

    // ==================== 启动 ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
